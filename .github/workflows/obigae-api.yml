name: obigae-api-deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        default: "tera-four-test"
        type: choice
        options:
          - tera-four-test
          - tera-four-development-367400
          - tera-four-staging
          - tera-four-production

permissions:
  contents: write
  id-token: write

env:
  PROJECT: ${{ github.event.inputs.environment }}

jobs:
  deploy_obigae_api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: echo github.event.inputs.environment
        run: echo "${{ github.event.inputs.environment }}"

